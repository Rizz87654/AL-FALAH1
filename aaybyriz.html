<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RizzDev-AI - AI by rizDev (Dengan Upload File)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            --text-color: #ffffff;
            --subheading-color: #cccccc;
            --placeholder-color: #aaaaaa;
            --primary-color: #0f0f23;
            --secondary-color: #1a1a2e;
            --secondary-hover-color: #252541;
            --scrollbar-color: #555555;
            --accent-color: #8B5CF6;
            --accent-secondary: #EC4899;
            --file-preview-bg: rgba(139, 92, 246, 0.1);
        }

        body.light-theme {
            --text-color: #000000;
            --subheading-color: #666666;
            --placeholder-color: #888888;
            --primary-color: #f8f8ff;
            --secondary-color: #f0f0f5;
            --secondary-hover-color: #e0e0eb;
            --scrollbar-color: #c0c0c0;
            --file-preview-bg: rgba(139, 92, 246, 0.05);
        }

        body {
            color: var(--text-color);
            background: var(--primary-color);
            transition: background 0.3s ease;
        }

        /* Hide validation bubble */
        .prompt-input:invalid {
            box-shadow: none;
        }
        
        .prompt-input:required:invalid {
            box-shadow: none;
        }

        /* Container */
        .container {
            overflow-y: auto;
            padding: 32px 0 60px;
            height: calc(100vh - 127px);
            scrollbar-color: var(--scrollbar-color) transparent;
        }

        .container :where(.app-header, .suggestions, .message, .prompt-wrapper) {
            position: relative;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            max-width: 990px;
        }

        .container .app-header {
            margin-top: 3vh;
            text-align: center;
        }

        .app-header .heading {
            font-size: clamp(1.8rem, 5vw, 3rem);
            background: linear-gradient(to right, var(--accent-color), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .app-header .sub-heading {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: var(--subheading-color);
        }

        /* Suggestions */
        .container .suggestions {
            width: 100%;
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 9.5vh;
        }

        body.chats-active .container :where(.app-header, .suggestions) {
            display: none;
        }

        .suggestions .suggestions-item {
            cursor: pointer;
            padding: 18px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-radius: 16px;
            justify-content: space-between;
            background: var(--secondary-color);
            transition: 0.3s ease;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .suggestions .suggestions-item:hover {
            background: var(--secondary-hover-color);
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(139, 92, 246, 0.3);
        }

        .suggestions .suggestions-item .text {
            font-size: 1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .suggestions .suggestions-item .icon {
            width: 40px;
            height: 40px;
            display: flex;
            font-size: 1.3rem;
            align-self: flex-end;
            align-items: center;
            border-radius: 50%;
            justify-content: center;
            color: var(--accent-color);
            background: var(--primary-color);
        }

        /* Chats */
        .chats-container .message {
            display: flex;
            gap: 11px;
            align-items: flex-start;
            animation: messageAppear 0.3s ease-out;
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chats-container .bot-message {
            margin: 9px auto;
        }

        .chats-container .user-message {
            flex-direction: column;
            align-items: flex-end;
        }

        .chats-container .user-message .message-text {
            padding: 12px 16px;
            max-width: 85%;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
            border-radius: 18px 18px 4px 18px;
            word-break: break-word;
            color: white;
            box-shadow: 0 4px 6px rgba(139, 92, 246, 0.2);
            font-size: 0.95rem;
        }

        /* File Preview di User Message */
        .user-message .file-preview {
            margin-bottom: 8px;
            max-width: 85%;
            background: var(--secondary-color);
            border-radius: 16px;
            padding: 8px 12px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .user-message .file-preview img {
            max-width: 60px;
            max-height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .user-message .file-preview .file-icon {
            font-size: 2rem;
        }

        .user-message .file-info {
            flex: 1;
            word-break: break-word;
        }

        .message-content {
            line-height: 1.6;
            font-size: 0.95rem;
            color: var(--text-color);
            padding: 15px;
            background: var(--secondary-color);
            border-radius: 18px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.1);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            font-weight: 700;
            color: var(--accent-secondary);
        }

        .message-content ul, .message-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin-bottom: 6px;
        }

        .message-content blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 12px 0;
            padding: 10px 15px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .message-content code {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-color);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .message-content pre {
            background: var(--secondary-hover-color);
            padding: 14px;
            border-radius: 10px;
            margin: 12px 0;
            overflow-x: auto;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .message-content pre code {
            background: none;
            padding: 0;
            color: var(--text-color);
        }

        .message-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-color);
        }

        .message-content a:hover {
            color: var(--accent-secondary);
        }

        /* Prompt Container */
        .prompt-container {
            position: fixed;
            width: 100%;
            left: 0;
            bottom: 0;
            padding: 12px 0;
            background: var(--primary-color);
            border-top: 1px solid var(--secondary-color);
            backdrop-filter: blur(10px);
        }

        .prompt-container :where(.prompt-wrapper, .prompt-form) {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .prompt-container .prompt-wrapper {
            margin: 0 auto;
            width: 100%;
            padding: 0 15px;
            max-width: 990px;
        }

        .prompt-container .prompt-form {
            height: 52px;
            width: 100%;
            border-radius: 30px;
            background: var(--secondary-color);
            border: 1px solid rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .prompt-form:focus-within {
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }

        .prompt-form .prompt-input {
            flex: 1;
            height: 100%;
            background: none;
            outline: none;
            border: none;
            font-size: 0.95rem;
            color: var(--text-color);
            padding: 0 10px;
        }

        .prompt-form .prompt-input::placeholder {
            color: var(--placeholder-color);
        }

        /* Remove validation message */
        .prompt-input:required:invalid,
        .prompt-input:focus:invalid {
            outline: none;
            border: none;
        }

        /* Tombol upload & send */
        .prompt-wrapper button {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            cursor: pointer;
            border-radius: 50%;
            font-size: 1.2rem;
            border: none;
            color: var(--text-color);
            background: var(--secondary-color);
            transition: 0.3s ease;
            border: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prompt-wrapper button:hover {
            background: var(--secondary-hover-color);
            transform: scale(1.02);
        }

        #send-prompt-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
            color: white;
        }

        #send-prompt-btn:hover {
            transform: scale(1.05);
        }

        #upload-btn {
            background: var(--secondary-color);
        }

        /* Home Button */
        .home-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--secondary-color);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            backdrop-filter: blur(5px);
        }

        .home-btn:hover {
            background: var(--secondary-hover-color);
            transform: scale(1.1);
        }

        .home-btn .material-symbols-rounded {
            font-size: 1.3rem;
        }

        /* Top Buttons */
        .top-buttons {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .top-buttons button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(139, 92, 246, 0.2);
            background: var(--secondary-color);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .top-buttons button:hover {
            background: var(--secondary-hover-color);
            transform: scale(1.05);
        }

        .top-buttons button .material-symbols-rounded {
            font-size: 1.3rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-color);
            border-radius: 10px;
        }

        /* Hidden file input */
        #file-input {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px 0 80px;
                height: calc(100vh - 110px);
            }
            
            .container :where(.app-header, .suggestions, .message, .prompt-wrapper) {
                padding: 0 15px;
            }
            
            .suggestions .suggestions-item {
                padding: 14px;
                min-height: 95px;
            }
            
            .suggestions .suggestions-item .text {
                font-size: 0.9rem;
            }
            
            .prompt-container {
                padding: 10px 0;
            }
            
            .prompt-container .prompt-form {
                height: 48px;
            }
            
            .prompt-wrapper button {
                width: 40px;
                height: 40px;
            }
            
            .home-btn, .top-buttons button {
                width: 40px;
                height: 40px;
            }
            
            .message-content {
                font-size: 0.9rem;
                padding: 12px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px 0 75px;
            }
            
            .suggestions .suggestions-item {
                padding: 12px;
                min-height: 85px;
            }
            
            .suggestions .suggestions-item .text {
                font-size: 0.85rem;
            }
            
            .prompt-container .prompt-form {
                height: 44px;
            }
            
            .prompt-wrapper button {
                width: 38px;
                height: 38px;
            }
            
            .message-content {
                font-size: 0.85rem;
                padding: 10px;
            }
            
            .chats-container .user-message .message-text {
                font-size: 0.85rem;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>
    <a id="home-btn" class="home-btn" href="index.html">
        <span class="material-symbols-rounded">home</span>
    </a>
    
    <div class="top-buttons">
        <button id="theme-toggle-btn">
            <span class="material-symbols-rounded">light_mode</span>
        </button>

            <span class="material-symbols-rounded">delete</span>
        </button>
    </div>

    <div class="container">
        <header class="app-header">
            <h1 class="heading">✨RizDev - AI ✨</h1>
            <h4 class="sub-heading">Ada yang bisa saya bantu? (Upload gambar/file juga bisa lho!)</h4>
        </header>

        <ul class="suggestions">
            <li class="suggestions-item">
                <p class="text">🌤️ Apa cuaca hari ini?</p>

            </li>

                <p class="text">📚 Tips belajar yang efektif</p>

        </ul>

        <div class="chats-container"></div>

        <div class="prompt-container">

                <form action="#" class="prompt-form" onsubmit="return false;">
                    <input type="text" placeholder="Ketik pesan... atau upload file/gambar" class="prompt-input" />
                    <button id="upload-btn" type="button" class="material-symbols-rounded">attach_file</button>

                </form>

        </div>
    </div>

    <input type="file" id="file-input" accept="image/*,application/pdf,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />

    <script>
        // ============ KONFIGURASI ============
        const API_KEY = "AIzaSyB1Id6E6rHUF4_SSIIh3iXWGOPHnVykylA";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`;
        
        let chatHistory = [];
        let currentFileData = null; // Untuk menyimpan file yang akan diupload (base64 + mime)
        let currentFileName = "";

        // ============ DETEKSI PENCIPTA ============
        function isAskingAboutCreator(message) {
            const lowerMsg = message.toLowerCase();
            const keywords = [
                'siapa pencipta', 'dibuat oleh siapa', 'pencipta kamu', 'siapa yang menciptakan',
                'creator', 'pembuat', 'developer', 'siapa ciptakan', 'diciptakan oleh',
                'siapa yang membuat', 'membuat kamu', 'penciptamu', 'ciptaan siapa',
                'siapa developermu', 'pengembangmu siapa', 'siapa pembuatmu', 'penciptamu siapa'
            ];
            return keywords.some(keyword => lowerMsg.includes(keyword));
        }

        function getCreatorResponse() {
            return `✨ *Tentang Penciptaku* ✨\n\nSudah pasti **rizDev** karena dia sangat oper power dalam bidang siber, Artificial Intelligence, dan sebagainya. Contohnya dia bisa menciptakan saya yang sangat canggih ini 🥰\n\n📱 *WhatsApp* : enc oleh developer\n🌐 *Website resmi* : riz-dev.vercel.app\n📢 *Telegram* : @Ryuzen54\n\nAda yang bisa saya bantu lagi? 😊`;
        }

        // ============ FORMAT TEKS ============
        function formatAIResponse(text) {
            if (!text) return '';
            
            let formatted = text;
            
            // Bold
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Headings
            formatted = formatted.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            formatted = formatted.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            formatted = formatted.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Blockquote
            formatted = formatted.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
            
            // Lists
            formatted = formatted.replace(/^\* (.*$)/gim, '<li>$1</li>');
            formatted = formatted.replace(/^- (.*$)/gim, '<li>$1</li>');
            formatted = formatted.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
            
            formatted = formatted.replace(/(<li>.*<\/li>)(\s*<li>.*<\/li>)*/gs, function(match) {
                if (match.match(/^\d+\./)) {
                    return '<ol>' + match + '</ol>';
                }
                return '<ul>' + match + '</ul>';
            });
            
            // Inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Links
            formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            
            // Line breaks
            const lines = formatted.split('\n');
            let result = [];
            let paragraph = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) {
                    if (paragraph.length) {
                        result.push('<p>' + paragraph.join(' ') + '</p>');
                        paragraph = [];
                    }
                } else if (line.startsWith('<h') || line.startsWith('<ul') || line.startsWith('<ol') || 
                           line.startsWith('<pre') || line.startsWith('<blockquote') || line.startsWith('<li')) {
                    if (paragraph.length) {
                        result.push('<p>' + paragraph.join(' ') + '</p>');
                        paragraph = [];
                    }
                    result.push(line);
                } else {
                    paragraph.push(line);
                }
            }
            
            if (paragraph.length) {
                result.push('<p>' + paragraph.join(' ') + '</p>');
            }
            
            return result.join('');
        }

        // ============ FUNGSI UTAMA ============
        const chatContainer = document.querySelector(".chats-container");
        const promptInput = document.querySelector(".prompt-input");
        const sendButton = document.querySelector("#send-prompt-btn");
        const uploadButton = document.querySelector("#upload-btn");
        const fileInput = document.getElementById("file-input");
        const suggestions = document.querySelectorAll(".suggestions-item");
        const themeBtn = document.querySelector("#theme-toggle-btn");
        const deleteBtn = document.querySelector("#delete-chats-btn");

        const scrollToBottom = () => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        // Fungsi untuk menampilkan preview file di user message
        function addUserMessageWithFile(text, fileInfo) {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message user-message";
            
            let filePreviewHtml = '';
            if (fileInfo) {
                if (fileInfo.type.startsWith('image/')) {
                    filePreviewHtml = `<div class="file-preview"><img src="${fileInfo.data}" alt="uploaded"><div class="file-info">${fileInfo.name}</div></div>`;
                } else {
                    const icon = fileInfo.type.includes('pdf') ? 'picture_as_pdf' : (fileInfo.type.includes('text') ? 'description' : 'insert_drive_file');
                    filePreviewHtml = `<div class="file-preview"><span class="material-symbols-rounded file-icon">${icon}</span><div class="file-info">${fileInfo.name}</div></div>`;
                }
            }
            
            const escapedText = text ? text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }) : '';
            
            messageDiv.innerHTML = `
                ${filePreviewHtml}
                ${text ? `<div class="message-text">${escapedText}</div>` : ''}
            `;
            
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function addMessage(text, isUser = false, fileInfo = null) {
            if (isUser) {
                addUserMessageWithFile(text, fileInfo);
            } else {
                const messageDiv = document.createElement("div");
                messageDiv.className = `message bot-message`;
                messageDiv.innerHTML = `<div class="message-content">${formatAIResponse(text)}</div>`;
                chatContainer.appendChild(messageDiv);
                scrollToBottom();
            }
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement("div");
            typingDiv.className = "message bot-message";
            typingDiv.id = "typing-indicator";
            typingDiv.innerHTML = '<div class="message-content"><em>⏳ Menganalisis file & mengetik...</em></div>';
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typing = document.getElementById("typing-indicator");
            if (typing) typing.remove();
        }

        // Proses file dan kirim ke Gemini dengan multimodal
        async function sendMessageWithFile(fileDataBase64, mimeType, fileName, userText) {
            showTypingIndicator();
            
            try {
                // Siapkan parts untuk Gemini: bisa teks + inline data (gambar/file)
                const parts = [];
                
                if (userText && userText.trim()) {
                    parts.push({ text: userText.trim() });
                } else {
                    parts.push({ text: `Saya mengirim file: ${fileName}. Tolong analisis file ini.` });
                }
                
                // Tambahkan data file jika ada
                if (fileDataBase64) {
                    // Hapus prefix data:image/png;base64, jika ada
                    let rawBase64 = fileDataBase64;
                    if (rawBase64.includes(',')) {
                        rawBase64 = rawBase64.split(',')[1];
                    }
                    parts.push({
                        inline_data: {
                            mime_type: mimeType,
                            data: rawBase64
                        }
                    });
                }
                
                const requestBody = {
                    contents: [{
                        role: "user",
                        parts: parts
                    }]
                };
                
                // Jika ada history chat, kita bisa append, tapi untuk multimodal lebih aman kirim langsung dengan konteks sederhana
                // Bisa juga menyimpan ke chatHistory sesuai format
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || 'API Error');
                
                removeTypingIndicator();
                const responseText = data.candidates[0].content.parts[0].text;
                addMessage(responseText, false);
                
                // Simpan ke chatHistory (untuk konteks selanjutnya, tapi kita skip karena multimodal agak beda struktur)
                // Untuk kemudahan, kita push history tanpa file (hanya teks respons)
                chatHistory.push({
                    role: "user",
                    parts: [{ text: userText || `[File: ${fileName}]` }]
                });
                chatHistory.push({
                    role: "model",
                    parts: [{ text: responseText }]
                });
                
            } catch (error) {
                removeTypingIndicator();
                addMessage(`❌ Gagal memproses file: ${error.message}`, false);
                console.error('API Error:', error);
            } finally {
                currentFileData = null;
                currentFileName = "";
            }
        }

        async function sendMessage() {
            const message = promptInput.value.trim();
            
            // Jika tidak ada file dan tidak ada teks, abaikan
            if (!message && !currentFileData) return;

            // Reset input
            promptInput.value = "";
            
            // Cek apakah hanya file tanpa teks
            const userText = message || "";
            
            // Jika ada file
            if (currentFileData) {
                // Tampilkan user message dengan file
                addMessage(userText, true, { data: currentFileData, name: currentFileName, type: currentFileMime });
                
                // Cek pertanyaan creator (jika hanya teks dan tidak ada file? tetap prioritas creator)
                if (userText && isAskingAboutCreator(userText) && !currentFileData) {
                    addMessage(getCreatorResponse(), false);
                    currentFileData = null;
                    return;
                }
                
                // Kirim ke AI dengan file
                await sendMessageWithFile(currentFileData, currentFileMime, currentFileName, userText);
                currentFileData = null;
                currentFileName = "";
                currentFileMime = "";
                return;
            }
            
            // Jika hanya teks biasa
            addMessage(userText, true);
            
            if (isAskingAboutCreator(userText)) {
                addMessage(getCreatorResponse(), false);
                return;
            }
            
            showTypingIndicator();
            
            try {
                chatHistory.push({
                    role: "user",
                    parts: [{ text: userText }]
                });
                
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: chatHistory })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || 'API Error');
                
                removeTypingIndicator();
                const responseText = data.candidates[0].content.parts[0].text;
                addMessage(responseText, false);
                
                chatHistory.push({
                    role: "model", 
                    parts: [{ text: responseText }]
                });
                
            } catch (error) {
                removeTypingIndicator();
                addMessage(`❌ Error: ${error.message}`, false);
                console.error('API Error:', error);
            }
        }
        
        let currentFileMime = "";
        
        // Fungsi handle upload file
        function handleFileUpload(file) {
            if (!file) return;
            
            // Validasi ukuran file (max 5MB untuk demo)
            if (file.size > 5 * 1024 * 1024) {
                alert("Ukuran file terlalu besar! Maksimal 5MB.");
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentFileData = e.target.result; // Base64 string
                currentFileName = file.name;
                currentFileMime = file.type;
                
                // Tampilkan informasi file di input placeholder
                promptInput.placeholder = `File siap: ${file.name} - ketik pertanyaan (opsional)`;
                promptInput.focus();
            };
            reader.readAsDataURL(file);
        }
        
        // Event listener untuk upload button
        uploadButton.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
            fileInput.value = ''; // reset agar bisa upload file yang sama lagi
        });

        function deleteChats() {
            if (confirm("🗑️ Hapus semua percakapan?")) {
                chatContainer.innerHTML = "";
                chatHistory = [];
                currentFileData = null;
                currentFileName = "";
                promptInput.placeholder = "Ketik pesan... atau upload file/gambar";
                addMessage("✨ Halo! Saya AI Assistant. Sekarang saya bisa menerima file/gambar untuk dianalisis! ✨", false);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle("light-theme");
            const isLight = document.body.classList.contains("light-theme");
            const themeIcon = themeBtn.querySelector(".material-symbols-rounded");
            themeIcon.textContent = isLight ? "dark_mode" : "light_mode";
        }

        // ============ EVENT LISTENERS ============
        sendButton.addEventListener('click', sendMessage);
        
        promptInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        suggestions.forEach(suggestion => {
            suggestion.addEventListener('click', function() {
                const text = this.querySelector('.text').textContent;
                promptInput.value = text;
                sendMessage();
            });
        });

        themeBtn.addEventListener('click', toggleTheme);
        deleteBtn.addEventListener('click', deleteChats);

        // ============ INITIAL WELCOME ============
        setTimeout(() => {
            if (chatContainer.children.length === 0) {
                addMessage("✨ Halo! Saya AI Assistant. Saya sekarang bisa menganalisis gambar dan file! Coba upload foto atau dokumen. ✨", false);
            }
        }, 500);

        // Fix for mobile keyboard
        promptInput.addEventListener('focus', function() {
            setTimeout(scrollToBottom, 300);
        });
    </script>
</body>
</html>
